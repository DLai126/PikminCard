<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏明信片收藏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 載入 Leaflet 地圖套件 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        /* 自定義深色捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .image-fit { object-fit: cover; width: 100%; height: 180px; }
        
        /* 修正 Leaflet 地圖彈出窗在深色模式的樣式 */
        .leaflet-popup-content-wrapper { background-color: #1E293B; color: #f1f5f9; border: 1px solid #334155; }
        .leaflet-popup-tip { background-color: #1E293B; border: 1px solid #334155; }
        .custom-leaflet-icon { border-radius: 50%; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); border: 2px solid #fff; background: #1E293B; display: flex; align-items: center; justify-content: center;}
        .custom-leaflet-icon img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-[#0B1120] min-h-screen font-sans text-slate-200">

    <!-- ⚠️ LINE/FB 內建瀏覽器警告橫幅 -->
    <div id="inAppWarning" class="hidden bg-red-600 text-white p-3 sm:p-4 text-sm font-bold text-center z-[1100] shadow-md border-b border-red-800 relative">
        <span class="text-xl block mb-1">⚠️ 無法在此登入 Google</span>
        偵測到您正在使用 LINE 或 FB 內建瀏覽器，這會被 Google 安全機制阻擋。<br>
        👉 請點擊畫面右上角或右下角的 <span class="bg-white/20 px-2 py-0.5 rounded text-yellow-200">選單 ⋮</span>，並選擇 <span class="text-yellow-300 text-base">「在預設瀏覽器中開啟」</span> (Safari / Chrome) 即可正常使用！
    </div>

    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <!-- Header -->
        <header class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-end border-b border-slate-800 pb-4 gap-4">
            <div>
                <h1 class="text-3xl sm:text-4xl font-bold text-white mb-2 flex items-center gap-3">
                    🌱 皮克敏明信片圖鑑
                </h1>
                <p class="text-slate-400 text-sm">記錄您的花點與菇點明信片，支援 Ctrl+V 貼上圖片</p>
            </div>
            <div class="flex flex-col sm:flex-row items-end gap-3">
                <div id="authArea" class="flex items-center gap-2">
                    <button id="loginBtn" onclick="window.loginWithGoogle()" class="text-xs bg-white text-slate-800 hover:bg-slate-200 px-3 py-1.5 rounded border border-slate-300 transition flex items-center gap-1 shadow-sm font-bold">
                        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google 登入
                    </button>
                    <div id="userInfo" class="hidden flex items-center gap-2 bg-slate-800 border border-slate-700 px-2 py-1 rounded-lg">
                        <img id="userAvatar" src="" class="w-5 h-5 rounded-full" alt="avatar">
                        <span id="userName" class="text-xs text-white"></span>
                        <button onclick="window.logout()" class="text-[10px] bg-slate-600 hover:bg-red-500 text-white px-2 py-0.5 rounded transition">登出</button>
                    </div>
                </div>
                <div class="text-sm text-slate-400 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">
                    顯示總數: <span id="countDisplay" class="text-white font-bold">0</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Left Column: Input Form -->
            <div class="lg:col-span-1 bg-[#1E293B] p-5 rounded-xl border border-slate-700 h-fit shadow-xl">
                <h2 class="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2">➕ 新增明信片</h2>
                
                <!-- Image Input -->
                <div class="mb-4">
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">圖片來源 (上傳或貼上)</label>
                    <div id="dropZone" class="border-2 border-dashed border-slate-600 rounded-lg p-3 text-center hover:border-blue-500 hover:bg-slate-800 transition-colors cursor-pointer flex flex-col items-center justify-center min-h-[120px] relative overflow-hidden" onclick="document.getElementById('fileInput').click()">
                        
                        <div id="placeholderText" class="text-slate-400">
                            <svg class="mx-auto h-8 w-8 mb-1 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <p class="text-xs">點擊、拖曳、或 Ctrl+V</p>
                            <button id="clipboardBtn" class="mt-2 px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs text-white transition z-20 relative shadow-sm border border-slate-600" onclick="event.stopPropagation(); window.pasteFromClipboard();">
                                📋 從剪貼簿讀取
                            </button>
                        </div>
                        
                        <img id="previewImage" src="" alt="預覽" class="hidden absolute inset-0 w-full h-full object-cover z-10" />
                        <button id="removeImageBtn" class="hidden absolute top-1 right-1 z-20 bg-red-500/80 text-white rounded-full p-1 hover:bg-red-600 transition" onclick="event.stopPropagation(); window.clearPreview();">
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                </div>

                <!-- Info Inputs -->
                <div class="space-y-3 mb-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">明信片名稱</label>
                        <input type="text" id="titleInput" placeholder="例如: 無邊際泳池" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-blue-500 text-sm text-white placeholder-slate-600">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">玩家名稱</label>
                            <input type="text" id="creatorInput" placeholder="例如: Jenma" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-blue-500 text-sm text-white placeholder-slate-600">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">類型</label>
                            <select id="typeInput" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-blue-500 text-sm text-white">
                                <option value="mushroom">🍄 菇點</option>
                                <option value="flower">🌸 花點</option>
                                <option value="hidden_flower">🤫 隱藏花點</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="block text-xs font-medium text-slate-400 mb-1">自訂標籤 (選填)</label>
                        <input type="text" id="customTagInput" placeholder="例如：風景 (不填則不顯示)" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-blue-500 text-sm text-white placeholder-slate-600">
                    </div>

                    <div class="mb-2">
                        <label class="block text-xs font-medium text-slate-400 mb-1">座標 (可直接貼上 緯度, 經度)</label>
                        <input type="text" id="coordsInput" placeholder="例如: 26.687957, 128.003198" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-blue-500 text-sm text-white placeholder-slate-600 font-mono">
                    </div>
                    
                    <div class="bg-slate-800/50 p-2.5 rounded-md border border-slate-700/50 flex items-center gap-2">
                        <span class="text-xl">📍</span>
                        <div class="flex-1 overflow-hidden">
                            <span class="text-[10px] text-slate-400 block mb-0.5">自動解析地點：</span>
                            <span id="previewLocation" class="text-sm text-slate-500 font-medium truncate block">尚未輸入座標</span>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button id="addBtn" class="w-full bg-[#3B6EA5] text-white font-medium py-2 rounded-md hover:bg-blue-600 transition shadow flex justify-center items-center text-sm">
                    <span id="btnText">上傳明信片</span>
                    <svg id="loadingSpinner" class="hidden animate-spin ml-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
                <p id="errorMsg" class="text-red-400 text-xs mt-2 hidden"></p>
                <p id="adminNotice" class="text-yellow-400 text-xs mt-2 hidden">⚠️ 非管理員上傳，需等候管理員審核後才會公開顯示。</p>
            </div>

            <!-- Right Column: Gallery / Map -->
            <div class="lg:col-span-3 flex flex-col">
                
                <!-- 控制列 (Filter & View Toggle Bar) -->
                <div class="mb-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="flex flex-wrap gap-2 items-center" id="filterBar">
                        <button onclick="window.setFilter('all')" data-type="all" class="filter-btn px-4 py-1.5 text-[13px] rounded-full bg-[#3B6EA5] text-white border border-[#3B6EA5] transition font-medium shadow-sm">全部顯示</button>
                        <button onclick="window.setFilter('mushroom')" data-type="mushroom" class="filter-btn px-4 py-1.5 text-[13px] rounded-full bg-slate-800 text-slate-300 border border-slate-700 transition hover:bg-slate-700 font-medium">🍄 菇點</button>
                        <button onclick="window.setFilter('flower')" data-type="flower" class="filter-btn px-4 py-1.5 text-[13px] rounded-full bg-slate-800 text-slate-300 border border-slate-700 transition hover:bg-slate-700 font-medium">🌸 花點</button>
                        <button onclick="window.setFilter('hidden_flower')" data-type="hidden_flower" class="filter-btn px-4 py-1.5 text-[13px] rounded-full bg-slate-800 text-slate-300 border border-slate-700 transition hover:bg-slate-700 font-medium">🤫 隱藏花點</button>
                    </div>
                    
                    <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700 shadow-sm shrink-0">
                        <button onclick="window.setView('gallery')" id="btnViewGallery" class="px-3 py-1 text-xs font-bold rounded-md transition-colors bg-slate-600 text-white shadow">🖼️ 畫廊</button>
                        <button onclick="window.setView('map')" id="btnViewMap" class="px-3 py-1 text-xs font-bold rounded-md transition-colors text-slate-400 hover:text-white">🗺️ 地圖</button>
                    </div>
                </div>

                <!-- 畫廊模式容器 -->
                <div id="galleryContainer" class="flex-grow">
                    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
                        <!-- 明信片卡片會在這裡生成 -->
                    </div>

                    <div id="emptyState" class="hidden text-center py-20 bg-[#1E293B] rounded-xl border border-slate-700 shadow-sm mt-0">
                        <span class="text-5xl mb-4 block">📭</span>
                        <p class="text-slate-400">沒有符合條件的明信片，趕快新增吧！</p>
                    </div>
                </div>

                <!-- 地圖模式容器 -->
                <div id="mapContainerWrapper" class="hidden w-full h-[600px] lg:h-full min-h-[500px] rounded-xl overflow-hidden border border-slate-700 shadow-xl relative z-10">
                    <div id="map" class="w-full h-full bg-slate-900"></div>
                </div>

            </div>

        </div>
    </div>

    <!-- 圖片放大 Modal (Lightbox) -->
    <div id="imageModal" class="hidden fixed inset-0 z-[1200] bg-black/90 flex justify-center items-center p-4 backdrop-blur-sm transition-opacity" onclick="window.closeImageModal()">
        <img id="modalImage" src="" class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl border border-slate-700" onclick="event.stopPropagation()">
        <button class="absolute top-6 right-6 text-slate-300 hover:text-white bg-slate-800/50 hover:bg-slate-700 rounded-full p-2 transition" onclick="window.closeImageModal()">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>

    <!-- 🚀 通用防呆確認 Modal (支援審核、隱藏、刪除) -->
    <div id="confirmModal" class="hidden fixed inset-0 z-[1150] bg-black/70 flex justify-center items-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-[#1E293B] border border-slate-700 p-6 rounded-xl shadow-2xl max-w-sm w-full relative overflow-hidden">
            <!-- 裝飾用背景光暈 -->
            <div id="cmGlow" class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl pointer-events-none"></div>
            
            <h3 id="cmTitle" class="text-xl font-bold text-white mb-2 flex items-center gap-2 relative z-10">
                <!-- 標題會動態載入 -->
            </h3>
            <p id="cmDesc" class="text-slate-300 text-sm mb-6 relative z-10">
                <!-- 說明會動態載入 -->
            </p>
            <div class="flex justify-end gap-3 relative z-10">
                <button onclick="window.closeConfirmModal()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-md text-sm transition font-medium">取消</button>
                <button id="cmConfirmBtn" class="px-4 py-2 text-white rounded-md text-sm transition font-bold shadow-lg">確認</button>
            </div>
        </div>
    </div>

    <!-- ✏️ 編輯明信片 Modal -->
    <div id="editModal" class="hidden fixed inset-0 z-[1160] bg-black/70 flex justify-center items-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-[#1E293B] border border-slate-700 p-6 rounded-xl shadow-2xl max-w-sm w-full relative overflow-hidden">
            <h3 class="text-xl font-bold text-white mb-4 flex items-center gap-2 relative z-10">
                ✏️ 修改明信片資訊
            </h3>
            <div class="space-y-4 mb-6 relative z-10">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">類型</label>
                    <select id="editTypeInput" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-blue-500 text-sm text-white">
                        <option value="mushroom">🍄 菇點</option>
                        <option value="flower">🌸 花點</option>
                        <option value="hidden_flower">🤫 隱藏花點</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">自訂標籤 (選填)</label>
                    <input type="text" id="editTagInput" placeholder="不填寫則不顯示" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-blue-500 text-sm text-white placeholder-slate-600">
                </div>
            </div>
            <div class="flex justify-end gap-3 relative z-10">
                <button onclick="window.closeEditModal()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-md text-sm transition font-medium">取消</button>
                <button onclick="window.confirmEditPostcard()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md text-sm transition font-bold shadow-lg">儲存修改</button>
            </div>
        </div>
    </div>

    <!-- 訊息提示元件 -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 bg-slate-800 border border-slate-600 text-white px-6 py-3 rounded-full shadow-2xl z-[1300] flex items-center gap-2">
        <svg class="w-5 h-5 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <span id="toastMsg">操作成功！</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        let useFirebase = true; 
        const appId = 'pikmincard';
        
        // 管理員的 Google UID
        const ADMIN_UID = 'RyrTKlBf2ZMq5heNaQtSv4rh3ui2';

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA5E_0Cb3InWPOYb-JCylMWDv1vdgEac1A",
            authDomain: "pikmincard.firebaseapp.com",
            databaseURL: "https://pikmincard-default-rtdb.firebaseio.com",
            projectId: "pikmincard",
            storageBucket: "pikmincard.firebasestorage.app",
            messagingSenderId: "428923825506",
            appId: "1:428923825506:web:b0c508dc9520d5a4f9103b",
            measurementId: "G-5X2MHNSZ8K"
        };
        // ==========================================

        let app, auth, db;
        let currentUserId = null;
        let postcards = [];
        let unsubscribeSnapshot = null;
        
        // 狀態變數
        let currentFilter = 'all'; 
        let currentDisplayMode = 'gallery'; // 'gallery' 或 'map'
        
        // 地圖相關變數
        let leafletMap = null;
        let mapMarkersLayer = null;

        const loginBtn = document.getElementById('loginBtn');
        const userInfo = document.getElementById('userInfo');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const adminNotice = document.getElementById('adminNotice');

        // 👉 偵測是否為 LINE 或 FB 等內建瀏覽器
        const isAppBrowser = /Line|FBAV|FBAN|Instagram/i.test(navigator.userAgent);
        if (isAppBrowser) {
            document.getElementById('inAppWarning').classList.remove('hidden');
        }

        // 啟動 Firebase
        if (useFirebase) {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // 無論有沒有登入，網頁一啟動就去抓公開的圖鑑讓大家看！
                loadPostcardsFromCloud();

                const provider = new GoogleAuthProvider();

                window.loginWithGoogle = async () => {
                    if (isAppBrowser) {
                        window.showToast("⚠️ 請先點擊選單「在預設瀏覽器中開啟」才能登入喔！");
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                        return;
                    }
                    try {
                        await signInWithPopup(auth, provider);
                    } catch (error) {
                        console.error("Google 登入失敗", error);
                        window.showToast("登入失敗：" + error.message);
                    }
                };

                window.logout = () => {
                    signOut(auth);
                };

                // 自動登入狀態監聽
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUserId = user.uid;
                        loginBtn.classList.add('hidden');
                        userInfo.classList.remove('hidden');
                        userAvatar.src = user.photoURL || '';
                        userName.textContent = user.displayName || '玩家';
                        
                        const creatorInput = document.getElementById('creatorInput');
                        if (creatorInput && !creatorInput.value) {
                            creatorInput.value = user.displayName || '';
                        }

                        if (currentUserId !== ADMIN_UID) {
                            adminNotice.classList.remove('hidden');
                        } else {
                            adminNotice.classList.add('hidden');
                        }
                    } else {
                        currentUserId = null;
                        loginBtn.classList.remove('hidden');
                        userInfo.classList.add('hidden');
                        adminNotice.classList.add('hidden');
                        document.getElementById('creatorInput').value = '';
                    }
                    
                    updateDisplay();
                });
            } catch(e) {
                console.error("Firebase 初始化失敗，請檢查 Config", e);
                useFirebase = false;
            }
        }

        // 載入雲端資料庫
        function loadPostcardsFromCloud() {

        // 圖片壓縮函數
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_dim = 800; 

                    if (width > height) {
                        if (width > max_dim) { height *= max_dim / width; width = max_dim; }
                    } else {
                        if (height > max_dim) { width *= max_dim / height; height = max_dim; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    callback(dataUrl);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateImagePreview(dataUrl) {

        // 剪貼簿與拖曳事件支援
        window.addEventListener('paste', async (e) => {
            const clipboardData = e.clipboardData || window.clipboardData;
            if (!clipboardData) return;
            let imageFound = false;
            if (clipboardData.files && clipboardData.files.length > 0) {
                for (let i = 0; i < clipboardData.files.length; i++) {
                    const file = clipboardData.files[i];
                    if (file.type.startsWith('image/')) {
                        compressImage(file, updateImagePreview);
                        imageFound = true; break;
                    }
                }
            }
            if (!imageFound && clipboardData.items) {
                for (let i = 0; i < clipboardData.items.length; i++) {
                    const item = clipboardData.items[i];
                    if (item.type.indexOf('image') !== -1) {
                        const blob = item.getAsFile();
                        if (blob) {
                            compressImage(blob, updateImagePreview);
                            imageFound = true; break;
                        }
                    }
                }
            }
            if (!imageFound) {
                const htmlData = clipboardData.getData('text/html');
                if (htmlData) {
                    const imgMatch = htmlData.match(/<img[^>]+src=["'](data:image\/[^;]+;base64,[^"']+)["']/i);
                    if (imgMatch && imgMatch[1]) {
                        try {
                            const res = await fetch(imgMatch[1]);
                            const blob = await res.blob();
                            compressImage(blob, updateImagePreview);
                            imageFound = true;
                        } catch (err) {}
                    }
                }
            }
            if (imageFound) window.showToast('已偵測並貼上圖片！');
        });

        async function fetchLocationName(lat, lng) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`;
                const response = await fetch(url, { headers: { 'Accept-Language': 'zh-TW,zh;q=0.9,en;q=0.8' } });
                if (!response.ok) throw new Error('API 請求失敗');
                const data = await response.json();
                if (data && data.address) {
                    const addr = data.address;
                    const country = addr.country || '';
                    const level1 = addr.state || addr.province || addr.county || '';
                    const level2 = addr.city || addr.town || addr.city_district || addr.district || '';
                    const level3 = addr.village || addr.suburb || addr.neighbourhood || addr.road || '';
                    let parts = [country, level1, level2, level3].filter(Boolean);
                    parts = [...new Set(parts)];
                    return parts.join('・') || "未知地點";
                }
                return "未知地點";
            } catch (error) { return "解析失敗"; }
        }

                        <button onclick="window.promptEditPostcard('${card.id}', '${card.type}', '${card.customTag || ''}')" class="bg-blue-500/90 text-white rounded-full p-1.5 shadow-lg hover:bg-blue-600" title="修改類型與標籤">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                        ${currentUserId === ADMIN_UID ? `
                        <button onclick="window.promptDeletePostcard('${card.id}')" class="bg-red-500/90 text-white rounded-full p-1.5 shadow-lg hover:bg-red-600" title="刪除">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                        ` : ''}
                    </div>
                ` : '';

                const customTagHtml = card.customTag ? `<span class="px-2 py-0.5 rounded-full text-[11px] bg-slate-800 text-slate-300 border border-slate-700">#${card.customTag}</span>` : '';

                return `
                <div class="bg-[#1A2035] rounded-xl overflow-hidden border ${isPending ? 'border-yellow-500' : 'border-[#2A344A]'} flex flex-col relative group shadow-lg">
                    ${pendingOverlay}
                    ${adminControlsHtml}
                    ${actionBtnsHtml}
                    
                    <div class="bg-[#3B6EA5] p-2.5 pb-3 relative">
                        <img src="${card.image}" alt="明信片" class="w-full h-[180px] object-cover rounded-md shadow-inner cursor-pointer hover:opacity-90 transition-opacity" loading="lazy" onclick="window.openImageModal('${card.image}')">
                        <h3 class="text-white font-bold text-[15px] mt-2.5 px-1 truncate shadow-sm">${card.title}</h3>
                    </div>
                    
                    <div class="p-4 flex flex-col flex-grow bg-[#1A2035]">
                        <div class="flex justify-between items-center mb-4 relative z-20">
                            <div class="flex items-center text-slate-400 text-xs">
                                <span>By</span>
                                <span class="text-white font-bold mx-1.5">${card.creator}</span>
                                <span class="text-[10px] bg-slate-800 px-1 rounded mr-1">🌱</span>
                                <span class="truncate max-w-[90px]">${hash}...</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="window.toggleLike('${card.id}', ${likesCount})" class="flex items-center bg-[#2A344A] px-2 py-1 rounded text-xs text-white hover:bg-[#34415C] transition-colors border border-slate-700">
                                    <svg class="w-3.5 h-3.5 mr-1 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                    <span>${likesCount}</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="bg-[#121726] border border-[#2A344A] rounded p-2.5 flex justify-between items-center mb-3 group/copy cursor-pointer relative z-20" onclick="window.copyCoords(${card.lat}, ${card.lng})" title="點擊複製座標">
                            <span class="text-slate-300 font-mono text-xs tracking-wide">
                                ${card.lat.toFixed(7)}, ${card.lng.toFixed(7)}
                            </span>
                            <button class="text-slate-500 group-hover/copy:text-white transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                            </button>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 mb-4 relative z-20">
                            <span class="px-2 py-0.5 rounded-full text-[11px] bg-slate-800 text-slate-300 border border-slate-700">${tagInfo.text}</span>
                            ${customTagHtml}
                        </div>
                        
                        <div class="mt-auto pt-3 border-t border-[#2A344A] relative z-20">
                            <div class="flex items-center gap-1.5 text-xs text-slate-400">
                                <div class="w-2 h-2 rounded-full flex-shrink-0" style="background-color: ${tagInfo.color}"></div>
                                <span class="truncate" title="${card.locationString}">${card.locationString}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            }).join('');
        }

        // ==========================================
        // 地圖模式邏輯 (Leaflet)
        // ==========================================

        function initLeafletMap() {
            // 以台灣中心點預設
            leafletMap = L.map('map').setView([23.6978, 120.9605], 7);
            
            // 使用質感深色地圖底圖 (CartoDB Dark Matter)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(leafletMap);

            mapMarkersLayer = L.layerGroup().addTo(leafletMap);
        }

        function renderMapView(displayCards) {
            if (!leafletMap || !mapMarkersLayer) return;
            
            // 清空舊圖標
            mapMarkersLayer.clearLayers();

            const bounds = [];

            displayCards.forEach(card => {
                if (!card.lat || !card.lng) return;

                const tagInfo = getTagInfo(card.type);
                const isPending = card.status === 'pending';
                
                // 外框樣式 (審核中用黃色，其餘依照卡片類型)
                const borderColor = isPending ? '#eab308' : tagInfo.color;

                // 👉 修改：製作地圖上的小圖標 HTML (將 w-10 h-10 放大為 w-14 h-14)
                const iconHtml = `
                    <div class="w-14 h-14 rounded-full border-[3px] overflow-hidden shadow-lg" style="border-color: ${borderColor}">
                        <img src="${card.image}" class="w-full h-full object-cover">
                    </div>
                `;
                
                // 👉 修改：更新 Leaflet Icon 的尺寸參數對應 56px
                const customIcon = L.divIcon({
                    html: iconHtml,
                    className: 'custom-leaflet-icon',
                    iconSize: [56, 56],
                    iconAnchor: [28, 28],
                    popupAnchor: [0, -28]
                });

                // 👉 修改：彈出資訊窗 HTML (加入座標與複製按鈕)
                const popupHtml = `
                    <div class="w-48 font-sans">
                        <div class="relative">
                            <img src="${card.image}" class="w-full h-24 object-cover rounded border border-slate-600 mb-2 cursor-pointer hover:opacity-90" onclick="window.openImageModal('${card.image}')">
                            ${isPending ? '<span class="absolute top-1 right-1 bg-yellow-500 text-slate-900 text-[10px] font-bold px-1 rounded">審核中</span>' : ''}
                        </div>
                        <h4 class="font-bold text-sm text-white mb-1 truncate">${card.title}</h4>
                        <p class="text-[11px] text-slate-400 mb-2 truncate">By ${card.creator}</p>
                        
                        <div class="bg-[#121726] border border-[#2A344A] rounded p-2 flex justify-between items-center mb-2 group/copy cursor-pointer" onclick="window.copyCoords(${card.lat}, ${card.lng})" title="點擊複製座標">
                            <span class="text-slate-300 font-mono text-[10px] tracking-wide truncate">
                                ${card.lat.toFixed(6)}, ${card.lng.toFixed(6)}
                            </span>
                            <button class="text-slate-500 hover:text-white transition-colors flex-shrink-0 ml-1">
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                            </button>
                        </div>
                        
                        <div class="flex items-center justify-between border-t border-slate-700 pt-2 mt-1 gap-1">
                            <div class="flex items-center flex-wrap gap-1">
                                <span class="text-[11px] px-1.5 py-0.5 rounded bg-slate-800 flex-shrink-0" style="color: ${tagInfo.color}">${tagInfo.text}</span>
                                ${card.customTag ? `<span class="text-[11px] px-1.5 py-0.5 rounded bg-slate-800 text-slate-300 border border-slate-700 flex-shrink-0">#${card.customTag}</span>` : ''}
                            </div>
                            <span class="text-xs text-slate-300 flex-shrink-0">❤️ ${card.likes || 0}</span>
                        </div>
                    </div>
                `;

                const marker = L.marker([card.lat, card.lng], { icon: customIcon });
                marker.bindPopup(popupHtml);
                mapMarkersLayer.addLayer(marker);

                bounds.push([card.lat, card.lng]);
            });

            // 如果有圖釘，自動縮放地圖到適合的範圍
            if (bounds.length > 0 && currentDisplayMode === 'map') {
                leafletMap.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
            }
        }

    </script>
</body>
</html>
