<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏明信片收藏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義深色捲軸樣式 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; /* slate-900 */
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; /* slate-700 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; /* slate-600 */
        }
        .image-fit {
            object-fit: cover;
            width: 100%;
            height: 180px;
        }
    </style>
</head>
<body class="bg-[#0B1120] min-h-screen font-sans text-slate-200">

    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <!-- Header -->
        <header class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-end border-b border-slate-800 pb-4 gap-4">
            <div>
                <h1 class="text-3xl sm:text-4xl font-bold text-white mb-2 flex items-center gap-3">
                    🌱 皮克敏明信片圖鑑
                </h1>
                <p class="text-slate-400 text-sm">記錄您的花點與菇點明信片，支援 Ctrl+V 貼上圖片</p>
            </div>
            <div class="flex flex-col sm:flex-row items-end gap-3">
                <div id="authArea" class="flex items-center gap-2">
                    <button id="loginBtn" onclick="window.loginWithGoogle()" class="text-xs bg-white text-slate-800 hover:bg-slate-200 px-3 py-1.5 rounded border border-slate-300 transition flex items-center gap-1 shadow-sm font-bold">
                        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google 登入
                    </button>
                    <div id="userInfo" class="hidden flex items-center gap-2 bg-slate-800 border border-slate-700 px-2 py-1 rounded-lg">
                        <img id="userAvatar" src="" class="w-5 h-5 rounded-full" alt="avatar">
                        <span id="userName" class="text-xs text-white"></span>
                        <button onclick="window.logout()" class="text-[10px] bg-slate-600 hover:bg-red-500 text-white px-2 py-0.5 rounded transition">登出</button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.exportData()" class="text-xs bg-slate-700 hover:bg-blue-600 text-white px-3 py-1.5 rounded border border-slate-600 transition flex items-center gap-1 shadow-sm">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        匯出備份
                    </button>
                </div>
                <div class="text-sm text-slate-400 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">
                    顯示總數: <span id="countDisplay" class="text-white font-bold">0</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Left Column: Input Form -->
            <div class="lg:col-span-1 bg-[#1E293B] p-5 rounded-xl border border-slate-700 h-fit shadow-xl">
                <h2 class="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2">➕ 新增明信片</h2>
                
                <!-- Image Input -->
                <div class="mb-4">
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">圖片來源 (上傳或貼上)</label>
                    <div id="dropZone" class="border-2 border-dashed border-slate-600 rounded-lg p-3 text-center hover:border-blue-500 hover:bg-slate-800 transition-colors cursor-pointer flex flex-col items-center justify-center min-h-[120px] relative overflow-hidden" onclick="document.getElementById('fileInput').click()">
                        
                        <div id="placeholderText" class="text-slate-400">
                            <svg class="mx-auto h-8 w-8 mb-1 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <p class="text-xs">點擊、拖曳、或 Ctrl+V</p>
                            <button id="clipboardBtn" class="mt-2 px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs text-white transition z-20 relative shadow-sm border border-slate-600" onclick="event.stopPropagation(); window.pasteFromClipboard();">
                                📋 從剪貼簿讀取
                            </button>
                        </div>
                        
                        <img id="previewImage" src="" alt="預覽" class="hidden absolute inset-0 w-full h-full object-cover z-10" />
                        <button id="removeImageBtn" class="hidden absolute top-1 right-1 z-20 bg-red-500/80 text-white rounded-full p-1 hover:bg-red-600 transition" onclick="event.stopPropagation(); window.clearPreview();">
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                </div>

                <!-- Info Inputs -->
                <div class="space-y-3 mb-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">明信片名稱</label>
                        <input type="text" id="titleInput" placeholder="例如: 無邊際泳池" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-blue-500 text-sm text-white placeholder-slate-600">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">玩家名稱</label>
                            <input type="text" id="creatorInput" placeholder="例如: Jenma" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-blue-500 text-sm text-white placeholder-slate-600">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">類型</label>
                            <select id="typeInput" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-blue-500 text-sm text-white">
                                <option value="mushroom">🍄 菇點</option>
                                <option value="flower">🌸 花點</option>
                                <option value="hidden_flower">🤫 隱藏花點</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="block text-xs font-medium text-slate-400 mb-1">座標 (可直接貼上 緯度, 經度)</label>
                        <input type="text" id="coordsInput" placeholder="例如: 26.687957, 128.003198" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-blue-500 text-sm text-white placeholder-slate-600 font-mono">
                    </div>
                    
                    <div class="bg-slate-800/50 p-2.5 rounded-md border border-slate-700/50 flex items-center gap-2">
                        <span class="text-xl">📍</span>
                        <div class="flex-1 overflow-hidden">
                            <span class="text-[10px] text-slate-400 block mb-0.5">自動解析地點：</span>
                            <span id="previewLocation" class="text-sm text-slate-500 font-medium truncate block">尚未輸入座標</span>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button id="addBtn" class="w-full bg-[#3B6EA5] text-white font-medium py-2 rounded-md hover:bg-blue-600 transition shadow flex justify-center items-center text-sm">
                    <span id="btnText">上傳明信片</span>
                    <svg id="loadingSpinner" class="hidden animate-spin ml-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
                <p id="errorMsg" class="text-red-400 text-xs mt-2 hidden"></p>
                <p id="adminNotice" class="text-yellow-400 text-xs mt-2 hidden">⚠️ 非管理員上傳，需等候管理員審核後才會公開顯示。</p>
            </div>

            <!-- Right Column: Gallery -->
            <div class="lg:col-span-3">
                
                <!-- 過濾器列 (Filter Bar) -->
                <div class="mb-5 flex flex-wrap gap-2 items-center" id="filterBar">
                    <button onclick="window.setFilter('all')" data-type="all" class="filter-btn px-4 py-1.5 text-[13px] rounded-full bg-[#3B6EA5] text-white border border-[#3B6EA5] transition font-medium shadow-sm">全部顯示</button>
                    <button onclick="window.setFilter('mushroom')" data-type="mushroom" class="filter-btn px-4 py-1.5 text-[13px] rounded-full bg-slate-800 text-slate-300 border border-slate-700 transition hover:bg-slate-700 font-medium">🍄 菇點</button>
                    <button onclick="window.setFilter('flower')" data-type="flower" class="filter-btn px-4 py-1.5 text-[13px] rounded-full bg-slate-800 text-slate-300 border border-slate-700 transition hover:bg-slate-700 font-medium">🌸 花點</button>
                    <button onclick="window.setFilter('hidden_flower')" data-type="hidden_flower" class="filter-btn px-4 py-1.5 text-[13px] rounded-full bg-slate-800 text-slate-300 border border-slate-700 transition hover:bg-slate-700 font-medium">🤫 隱藏花點</button>
                </div>

                <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
                    <!-- 明信片卡片會在這裡生成 -->
                </div>

                <div id="emptyState" class="hidden text-center py-20 bg-[#1E293B] rounded-xl border border-slate-700 shadow-sm mt-0">
                    <span class="text-5xl mb-4 block">📭</span>
                    <p class="text-slate-400">沒有符合條件的明信片，趕快新增吧！</p>
                </div>
            </div>

        </div>
    </div>

    <!-- 圖片放大 Modal (Lightbox) -->
    <div id="imageModal" class="hidden fixed inset-0 z-[120] bg-black/90 flex justify-center items-center p-4 backdrop-blur-sm transition-opacity" onclick="window.closeImageModal()">
        <img id="modalImage" src="" class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl border border-slate-700" onclick="event.stopPropagation()">
        <button class="absolute top-6 right-6 text-slate-300 hover:text-white bg-slate-800/50 hover:bg-slate-700 rounded-full p-2 transition" onclick="window.closeImageModal()">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>

    <!-- 刪除確認 Modal -->
    <div id="deleteModal" class="hidden fixed inset-0 z-[110] bg-black/70 flex justify-center items-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-[#1E293B] border border-slate-700 p-6 rounded-xl shadow-2xl max-w-sm w-full">
            <h3 class="text-xl font-bold text-white mb-2 flex items-center gap-2">
                <svg class="w-6 h-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                確認刪除
            </h3>
            <p class="text-slate-300 text-sm mb-6">您確定要刪除這張明信片嗎？此動作將無法復原。</p>
            <div class="flex justify-end gap-3">
                <button onclick="window.closeDeleteModal()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-md text-sm transition font-medium">取消</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-md text-sm transition font-bold shadow-lg">確認刪除</button>
            </div>
        </div>
    </div>

    <!-- 訊息提示元件 -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 bg-slate-800 border border-slate-600 text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-2 z-[100]">
        <svg class="w-5 h-5 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <span id="toastMsg">操作成功！</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        let useFirebase = true; 
        const appId = 'pikmincard';
        
        // 管理員的 Google UID
        const ADMIN_UID = 'RyrTKlBf2ZMq5heNaQtSv4rh3ui2';

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA5E_0Cb3InWPOYb-JCylMWDv1vdgEac1A",
            authDomain: "pikmincard.firebaseapp.com",
            databaseURL: "https://pikmincard-default-rtdb.firebaseio.com",
            projectId: "pikmincard",
            storageBucket: "pikmincard.firebasestorage.app",
            messagingSenderId: "428923825506",
            appId: "1:428923825506:web:b0c508dc9520d5a4f9103b",
            measurementId: "G-5X2MHNSZ8K"
        };
        // ==========================================

        let app, auth, db;
        let currentUserId = null;
        let postcards = [];
        let unsubscribeSnapshot = null;
        let currentFilter = 'all'; // 預設顯示全部

        const loginBtn = document.getElementById('loginBtn');
        const userInfo = document.getElementById('userInfo');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const adminNotice = document.getElementById('adminNotice');

        // 啟動 Firebase
        if (useFirebase) {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                const provider = new GoogleAuthProvider();

                window.loginWithGoogle = async () => {
                    try {
                        await signInWithPopup(auth, provider);
                    } catch (error) {
                        console.error("Google 登入失敗", error);
                        window.showToast("登入失敗：" + error.message);
                    }
                };

                window.logout = () => {
                    signOut(auth);
                };

                // 自動登入狀態監聽
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUserId = user.uid;
                        
                        // 更新介面
                        loginBtn.classList.add('hidden');
                        userInfo.classList.remove('hidden');
                        userAvatar.src = user.photoURL || '';
                        userName.textContent = user.displayName || '玩家';
                        
                        const creatorInput = document.getElementById('creatorInput');
                        if (creatorInput && !creatorInput.value) {
                            creatorInput.value = user.displayName || '';
                        }

                        if (currentUserId !== ADMIN_UID) {
                            adminNotice.classList.remove('hidden');
                        } else {
                            adminNotice.classList.add('hidden');
                        }

                        loadPostcardsFromCloud();
                    } else {
                        currentUserId = null;
                        
                        loginBtn.classList.remove('hidden');
                        userInfo.classList.add('hidden');
                        adminNotice.classList.add('hidden');
                        document.getElementById('creatorInput').value = '';
                        
                        if(unsubscribeSnapshot) unsubscribeSnapshot();
                        
                        postcards = [];
                        renderGallery();
                    }
                });
            } catch(e) {
                console.error("Firebase 初始化失敗，請檢查 Config", e);
                useFirebase = false;
            }
        }

        // 載入雲端資料庫
        function loadPostcardsFromCloud() {
            if (!currentUserId) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'postcards');
            unsubscribeSnapshot = onSnapshot(colRef, (snapshot) => {
                postcards = [];
                snapshot.forEach(docSnap => {
                    postcards.push({ id: docSnap.id, ...docSnap.data() });
                });
                postcards.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                renderGallery();
            }, (error) => {
                console.error("讀取資料失敗", error);
            });
        }

        // DOM 元素
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const placeholderText = document.getElementById('placeholderText');
        const removeImageBtn = document.getElementById('removeImageBtn');
        const titleInput = document.getElementById('titleInput');
        const creatorInput = document.getElementById('creatorInput');
        const typeInput = document.getElementById('typeInput');
        const coordsInput = document.getElementById('coordsInput');
        const previewLocation = document.getElementById('previewLocation');
        const addBtn = document.getElementById('addBtn');
        const gallery = document.getElementById('gallery');
        const emptyState = document.getElementById('emptyState');
        const countDisplay = document.getElementById('countDisplay');
        const btnText = document.getElementById('btnText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorMsg = document.getElementById('errorMsg');

        let currentImageDataUrl = null;
        let parsedLat = null;
        let parsedLng = null;
        let parsedLocationString = "未知地點";

        // 過濾器切換邏輯
        window.setFilter = function(type) {
            currentFilter = type;
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                if (btn.dataset.type === type) {
                    btn.classList.add('bg-[#3B6EA5]', 'text-white', 'border-[#3B6EA5]');
                    btn.classList.remove('bg-slate-800', 'text-slate-300', 'border-slate-700');
                } else {
                    btn.classList.remove('bg-[#3B6EA5]', 'text-white', 'border-[#3B6EA5]');
                    btn.classList.add('bg-slate-800', 'text-slate-300', 'border-slate-700');
                }
            });
            renderGallery();
        };

        // 圖片壓縮函數
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_dim = 800; 

                    if (width > height) {
                        if (width > max_dim) { height *= max_dim / width; width = max_dim; }
                    } else {
                        if (height > max_dim) { width *= max_dim / height; height = max_dim; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    callback(dataUrl);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 貼上與拖曳事件...
        window.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file') {
                    const blob = item.getAsFile();
                    if (blob && blob.type.startsWith('image/')) {
                        compressImage(blob, (dataUrl) => {
                            currentImageDataUrl = dataUrl;
                            previewImage.src = currentImageDataUrl;
                            previewImage.classList.remove('hidden');
                            removeImageBtn.classList.remove('hidden');
                            placeholderText.classList.add('hidden');
                            errorMsg.classList.add('hidden');
                        });
                        window.showToast('已偵測並貼上圖片！');
                    }
                }
            }
        });

        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-blue-500', 'bg-slate-800'); });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('border-blue-500', 'bg-slate-800'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-slate-800');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                const file = e.dataTransfer.files[0];
                if (file.type.startsWith('image/')) {
                    compressImage(file, (dataUrl) => {
                        currentImageDataUrl = dataUrl;
                        previewImage.src = currentImageDataUrl;
                        previewImage.classList.remove('hidden');
                        removeImageBtn.classList.remove('hidden');
                        placeholderText.classList.add('hidden');
                        errorMsg.classList.add('hidden');
                    });
                }
            }
        });

        window.pasteFromClipboard = async function() {
            try {
                const clipboardItems = await navigator.clipboard.read();
                for (const clipboardItem of clipboardItems) {
                    const imageTypes = clipboardItem.types.filter(type => type.startsWith('image/'));
                    if (imageTypes.length > 0) {
                        const blob = await clipboardItem.getType(imageTypes[0]);
                        compressImage(blob, (dataUrl) => {
                            currentImageDataUrl = dataUrl;
                            previewImage.src = currentImageDataUrl;
                            previewImage.classList.remove('hidden');
                            removeImageBtn.classList.remove('hidden');
                            placeholderText.classList.add('hidden');
                            errorMsg.classList.add('hidden');
                        });
                        window.showToast('已從剪貼簿匯入圖片！');
                        return;
                    }
                }
                window.showToast('剪貼簿中沒有圖片，請確認您複製的是圖片。');
            } catch (err) {
                window.focus(); 
                dropZone.classList.add('border-blue-500', 'bg-slate-700');
                window.showToast('👉 瀏覽器安全阻擋，請直接按下鍵盤 Ctrl+V 貼上圖片！');
                setTimeout(() => { dropZone.classList.remove('border-blue-500', 'bg-slate-700'); }, 2000);
            }
        };

        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                compressImage(e.target.files[0], (dataUrl) => {
                    currentImageDataUrl = dataUrl;
                    previewImage.src = currentImageDataUrl;
                    previewImage.classList.remove('hidden');
                    removeImageBtn.classList.remove('hidden');
                    placeholderText.classList.add('hidden');
                    errorMsg.classList.add('hidden');
                });
            }
        });

        window.clearPreview = function() {
            currentImageDataUrl = null;
            fileInput.value = '';
            previewImage.src = '';
            previewImage.classList.add('hidden');
            removeImageBtn.classList.add('hidden');
            placeholderText.classList.remove('hidden');
        };

        // 地理編碼與通知
        async function fetchLocationName(lat, lng) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`;
                const response = await fetch(url, { headers: { 'Accept-Language': 'zh-TW,zh;q=0.9,en;q=0.8' } });
                if (!response.ok) throw new Error('API 請求失敗');
                const data = await response.json();
                if (data && data.address) {
                    const addr = data.address;
                    const country = addr.country || '';
                    const level1 = addr.state || addr.province || addr.county || '';
                    const level2 = addr.city || addr.town || addr.city_district || addr.district || '';
                    const level3 = addr.village || addr.suburb || addr.neighbourhood || addr.road || '';
                    let parts = [country, level1, level2, level3].filter(Boolean);
                    parts = [...new Set(parts)];
                    return parts.join('・') || "未知地點";
                }
                return "未知地點";
            } catch (error) {
                console.error("Geocoding error:", error);
                return "解析失敗";
            }
        }

        window.showToast = function(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        };

        coordsInput.addEventListener('input', async (e) => {
            const val = e.target.value.trim();
            const match = val.match(/(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)/);
            if (match && match.length === 3) {
                parsedLat = parseFloat(match[1]);
                parsedLng = parseFloat(match[2]);
                previewLocation.textContent = "地點解析中...";
                previewLocation.className = "text-sm text-blue-400 font-medium truncate block animate-pulse";
                parsedLocationString = await fetchLocationName(parsedLat, parsedLng);
                previewLocation.textContent = parsedLocationString;
                previewLocation.className = "text-sm text-green-400 font-medium truncate block";
            } else {
                parsedLat = null;
                parsedLng = null;
                parsedLocationString = "未知地點";
                previewLocation.textContent = val.length > 0 ? "座標格式錯誤..." : "尚未輸入座標";
                previewLocation.className = "text-sm text-slate-500 font-medium truncate block";
            }
        });

        window.copyCoords = function(lat, lng) {
            const text = `${lat}, ${lng}`;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                window.showToast('已複製座標！');
            } catch (err) {}
            document.body.removeChild(textArea);
        };

        // 新增/上傳按鈕
        addBtn.addEventListener('click', async () => {
            if (useFirebase && !currentUserId) {
                errorMsg.textContent = '請先點擊右上角登入 Google 帳號。';
                errorMsg.classList.remove('hidden');
                return;
            }
            const title = titleInput.value.trim() || '未命名明信片';
            const creator = creatorInput.value.trim() || '匿名玩家';
            const type = typeInput.value;

            if (!currentImageDataUrl) {
                errorMsg.textContent = '請先上傳或貼上圖片。';
                errorMsg.classList.remove('hidden');
                return;
            }
            if (parsedLat === null || parsedLng === null) {
                errorMsg.textContent = '請輸入或貼上有效的座標。';
                errorMsg.classList.remove('hidden');
                return;
            }

            errorMsg.classList.add('hidden');
            btnText.textContent = '上傳中...';
            loadingSpinner.classList.remove('hidden');
            addBtn.disabled = true;
            addBtn.classList.add('opacity-75', 'cursor-not-allowed');

            const newStatus = (currentUserId === ADMIN_UID) ? 'approved' : 'pending';

            const newPostcard = {
                image: currentImageDataUrl,
                title: title,
                creator: creator,
                creatorUid: currentUserId,
                type: type,
                lat: parsedLat,
                lng: parsedLng,
                locationString: parsedLocationString,
                likes: 0,
                status: newStatus, 
                timestamp: new Date().toISOString()
            };

            try {
                if (useFirebase) {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'postcards');
                    await addDoc(colRef, newPostcard);
                    
                    if (newStatus === 'approved') {
                        window.showToast('已成功發布至雲端圖鑑！');
                    } else {
                        window.showToast('上傳成功！將等待管理員核准後公開。');
                    }
                }
                
                window.clearPreview();
                titleInput.value = '';
                coordsInput.value = '';
                parsedLat = null;
                parsedLng = null;
                parsedLocationString = "未知地點";
                previewLocation.textContent = "尚未輸入座標";
                previewLocation.className = "text-sm text-slate-500 font-medium truncate block";
            } catch (e) {
                console.error("儲存失敗:", e);
                window.showToast("儲存失敗，請檢查網路連線。");
            }

            btnText.textContent = '上傳明信片';
            loadingSpinner.classList.add('hidden');
            addBtn.disabled = false;
            addBtn.classList.remove('opacity-75', 'cursor-not-allowed');
        });

        // 圖片點擊放大 Modal 邏輯
        window.openImageModal = function(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // 防止背景滾動
        };

        window.closeImageModal = function() {
            document.getElementById('imageModal').classList.add('hidden');
            document.body.style.overflow = '';
        };

        // 刪除確認 Modal 邏輯
        let cardToDeleteId = null;
        window.promptDeletePostcard = function(id) {
            cardToDeleteId = id;
            document.getElementById('deleteModal').classList.remove('hidden');
        };

        window.closeDeleteModal = function() {
            cardToDeleteId = null;
            document.getElementById('deleteModal').classList.add('hidden');
        };

        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if (!cardToDeleteId) return;
            const id = cardToDeleteId;
            window.closeDeleteModal();
            try {
                if (useFirebase && currentUserId === ADMIN_UID) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'postcards', id));
                    window.showToast('已刪除明信片');
                }
            } catch(e) { console.error("刪除失敗", e); }
        });

        // 管理員核准明信片
        window.approvePostcard = async function(id) {
            try {
                if (useFirebase && currentUserId === ADMIN_UID) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'postcards', id);
                    await updateDoc(docRef, { status: 'approved' });
                    window.showToast('已核准該明信片！公開顯示中。');
                }
            } catch(e) { console.error("核准失敗", e); }
        };

        window.toggleLike = async function(id, currentLikes) {
            try {
                if (useFirebase && currentUserId) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'postcards', id);
                    await updateDoc(docRef, {
                        likes: currentLikes + 1
                    });
                }
            } catch(e) { console.error("按讚失敗", e); }
        };

        window.exportData = function() {
            if (postcards.length === 0) {
                window.showToast('目前沒有可以匯出的明信片。');
                return;
            }
            const approvedData = postcards.filter(c => !c.status || c.status === 'approved');
            const dataStr = JSON.stringify(approvedData);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,"");
            a.download = `Pikmin_Backup_${dateStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
            window.showToast('備份檔案已下載！');
        };

        function renderGallery() {
            // 👉 過濾顯示邏輯 (權限 + 頁籤分類)
            const displayCards = postcards.filter(card => {
                // 1. 權限判斷
                let isAuthVisible = false;
                if (currentUserId === ADMIN_UID) isAuthVisible = true;
                else if (!card.status || card.status === 'approved') isAuthVisible = true;
                else if (card.creatorUid === currentUserId) isAuthVisible = true;
                
                if (!isAuthVisible) return false;

                // 2. 頁籤分類判斷
                if (currentFilter !== 'all' && card.type !== currentFilter) return false;

                return true;
            });

            // 更新顯示數量
            countDisplay.textContent = displayCards.length;

            if (displayCards.length === 0) {
                gallery.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            gallery.innerHTML = displayCards.map(card => {
                // 設定標籤顏色與文字
                let tagColor = '#e11d48'; 
                let tagText = '#花點';
                if (card.type === 'mushroom') {
                    tagColor = '#9333ea';
                    tagText = '#菇點';
                } else if (card.type === 'hidden_flower') {
                    tagColor = '#10b981'; // 綠色
                    tagText = '#隱藏花點';
                }

                const hash = String(new Date(card.timestamp).getTime()).slice(-10);
                const likesCount = card.likes || 0;
                
                // 是否為等待審核狀態 (使用 pointer-events-none 確保可以點擊底下的圖片放大)
                const isPending = card.status === 'pending';
                const pendingOverlay = isPending ? `
                    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-[1px] z-10 flex items-center justify-center pointer-events-none">
                        <span class="bg-yellow-500 text-slate-900 text-xs font-bold px-3 py-1 rounded shadow-lg transform -rotate-12">等待審核中</span>
                    </div>
                ` : '';

                const approveBtnHtml = (currentUserId === ADMIN_UID && isPending) ? `
                    <button onclick="window.approvePostcard('${card.id}')" class="absolute top-2 left-2 bg-green-500/90 text-white rounded-full px-3 py-1 text-[11px] font-bold shadow-lg hover:bg-green-600 transition z-20">
                        ✅ 核准公開
                    </button>
                ` : '';

                // 改呼叫防呆刪除視窗
                const showDeleteBtn = (currentUserId === ADMIN_UID);
                const deleteBtnHtml = showDeleteBtn ? `
                    <button onclick="window.promptDeletePostcard('${card.id}')" class="absolute top-2 right-2 bg-red-500/90 text-white rounded-full p-1.5 opacity-0 group-hover:opacity-100 transition-opacity z-20 shadow-lg hover:bg-red-600">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                ` : '';

                return `
                <div class="bg-[#1A2035] rounded-xl overflow-hidden border ${isPending ? 'border-yellow-500' : 'border-[#2A344A]'} flex flex-col relative group">
                    ${pendingOverlay}
                    ${approveBtnHtml}
                    ${deleteBtnHtml}
                    
                    <div class="bg-[#3B6EA5] p-2.5 pb-3 relative">
                        <!-- 加入點擊放大事件 -->
                        <img src="${card.image}" alt="明信片" class="w-full h-[180px] object-cover rounded-md shadow-inner cursor-pointer hover:opacity-90 transition-opacity" loading="lazy" onclick="window.openImageModal('${card.image}')">
                        <h3 class="text-white font-bold text-[15px] mt-2.5 px-1 truncate shadow-sm">${card.title}</h3>
                    </div>
                    
                    <div class="p-4 flex flex-col flex-grow bg-[#1A2035]">
                        <div class="flex justify-between items-center mb-4 relative z-20">
                            <div class="flex items-center text-slate-400 text-xs">
                                <span>By</span>
                                <span class="text-white font-bold mx-1.5">${card.creator}</span>
                                <span class="text-[10px] bg-slate-800 px-1 rounded mr-1">🌱</span>
                                <span class="truncate max-w-[90px]">${hash}...</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="window.toggleLike('${card.id}', ${likesCount})" class="flex items-center bg-[#2A344A] px-2 py-1 rounded text-xs text-white hover:bg-[#34415C] transition-colors border border-slate-700">
                                    <svg class="w-3.5 h-3.5 mr-1 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                    <span>${likesCount}</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="bg-[#121726] border border-[#2A344A] rounded p-2.5 flex justify-between items-center mb-3 group/copy cursor-pointer relative z-20" onclick="window.copyCoords(${card.lat}, ${card.lng})" title="點擊複製座標">
                            <span class="text-slate-300 font-mono text-xs tracking-wide">
                                ${card.lat.toFixed(7)}, ${card.lng.toFixed(7)}
                            </span>
                            <button class="text-slate-500 group-hover/copy:text-white transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                            </button>
                        </div>
                        
                        <div class="flex gap-2 mb-4 relative z-20">
                            <span class="px-2 py-0.5 rounded-full text-[11px] bg-slate-800 text-slate-300 border border-slate-700">${tagText}</span>
                            <span class="px-2 py-0.5 rounded-full text-[11px] bg-slate-800 text-slate-300 border border-slate-700">#風景</span>
                        </div>
                        
                        <div class="mt-auto pt-3 border-t border-[#2A344A] relative z-20">
                            <div class="flex items-center gap-1.5 text-xs text-slate-400">
                                <div class="w-2 h-2 rounded-full flex-shrink-0" style="background-color: ${tagColor}"></div>
                                <span class="truncate" title="${card.locationString}">${card.locationString}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            }).join('');
        }
    </script>
</body>
</html>
