<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏明信片收藏</title>
    
    <!-- 加入 Google Fonts 可愛圓體字型 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap" rel="stylesheet">
    
    <!-- 載入 Tailwind CSS (啟用 class-based 深色模式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pikmin: {
                            yellow: '#FEFCE8', // 輕柔的淡黃底色
                            blue: '#60A5FA',   // 活力的淺藍色
                            white: '#FFFFFF',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- 載入 Leaflet 地圖套件 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        /* 自定義捲軸樣式 (支援亮色與暗色) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fefce8; }
        ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #60a5fa; }
        
        .dark ::-webkit-scrollbar-track { background: #0f172a; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .image-fit { object-fit: cover; width: 100%; height: 180px; }
        
        /* Leaflet 地圖彈出窗樣式 (亮色) */
        .leaflet-popup-content-wrapper { background-color: #ffffff; color: #1e293b; border: 1px solid #bfdbfe; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .leaflet-popup-tip { background-color: #ffffff; border: 1px solid #bfdbfe; }
        
        /* Leaflet 地圖彈出窗樣式 (暗色) */
        .dark .leaflet-popup-content-wrapper { background-color: #1E293B; color: #f1f5f9; border: 1px solid #334155; }
        .dark .leaflet-popup-tip { background-color: #1E293B; border: 1px solid #334155; }
        
        .custom-leaflet-icon { border-radius: 50%; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); border: 3px solid #fff; background: #fff; display: flex; align-items: center; justify-content: center;}
        .dark .custom-leaflet-icon { border-color: #1E293B; background: #1E293B; }
        .custom-leaflet-icon img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-yellow-50 dark:bg-[#0B1120] min-h-screen font-sans text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <!-- ⚠️ LINE/FB 內建瀏覽器警告橫幅 -->
    <div id="inAppWarning" class="hidden bg-red-500 text-white p-3 sm:p-4 text-sm font-bold text-center z-[1100] shadow-md border-b border-red-600 relative">
        <span class="text-xl block mb-1">⚠️ 無法在此登入 Google</span>
        偵測到您正在使用 LINE 或 FB 內建瀏覽器，這會被 Google 安全機制阻擋。<br>
        👉 請點擊畫面右上角或右下角的 <span class="bg-white/20 px-2 py-0.5 rounded text-yellow-100">選單 ⋮</span>，並選擇 <span class="text-yellow-200 text-base">「在預設瀏覽器中開啟」</span> (Safari / Chrome) 即可正常使用！
    </div>

    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <!-- Header -->
        <header class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-end border-b border-blue-200 dark:border-slate-800 pb-4 gap-4 transition-colors">
            <div>
                <h1 class="text-3xl sm:text-4xl font-extrabold text-blue-900 dark:text-white mb-2 flex items-center gap-3 drop-shadow-sm" style="font-family: 'M PLUS Rounded 1c', sans-serif;">
                    🌱 皮克敏明信片圖鑑
                </h1>
                <p class="text-blue-600/80 dark:text-slate-400 text-sm font-medium">記錄您的花點與菇點明信片，支援 Ctrl+V 貼上圖片</p>
            </div>
            <div class="flex flex-col sm:flex-row items-end gap-3">
                <div id="authArea" class="flex items-center gap-2">
                    <button onclick="window.toggleTheme()" class="text-xs bg-white dark:bg-slate-700 hover:bg-blue-50 dark:hover:bg-slate-600 text-blue-800 dark:text-white px-3 py-1.5 rounded border border-blue-200 dark:border-slate-600 transition-all duration-200 shadow-sm active:scale-95 flex items-center gap-1 font-bold">
                        <span id="themeIcon">🌙 暗色</span>
                    </button>
                    
                    <button id="loginBtn" onclick="window.loginWithGoogle()" class="text-xs bg-white dark:bg-slate-700 hover:-translate-y-0.5 text-slate-800 dark:text-white hover:bg-blue-50 dark:hover:bg-slate-600 px-3 py-1.5 rounded border border-blue-200 dark:border-slate-600 transition-all duration-200 shadow-sm active:scale-95 flex items-center gap-1 font-bold">
                        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google 登入
                    </button>
                    <div id="userInfo" class="hidden flex items-center gap-2 bg-white dark:bg-slate-800 border border-blue-200 dark:border-slate-700 px-2 py-1 rounded-lg shadow-sm">
                        <img id="userAvatar" src="" class="w-5 h-5 rounded-full border border-blue-100 dark:border-transparent" alt="avatar">
                        <span id="userName" class="text-xs text-blue-900 dark:text-white font-bold"></span>
                        <button onclick="window.logout()" class="text-[10px] bg-red-100 hover:bg-red-500 text-red-600 hover:text-white dark:bg-slate-600 dark:text-white dark:hover:bg-red-500 px-2 py-0.5 rounded transition-all active:scale-90 font-bold">登出</button>
                    </div>
                </div>
                <div class="text-sm text-blue-800 dark:text-slate-400 bg-white dark:bg-slate-800 px-3 py-1.5 rounded-lg border border-blue-200 dark:border-slate-700 shadow-sm font-medium">
                    顯示總數: <span id="countDisplay" class="text-blue-600 dark:text-white font-extrabold text-base">0</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Left Column: Input Form -->
            <div class="lg:col-span-1 bg-white dark:bg-[#1E293B] p-5 rounded-xl border border-blue-100 dark:border-slate-700 h-fit shadow-lg transition-colors">
                <h2 class="text-lg font-extrabold text-blue-900 dark:text-white mb-4 border-b border-blue-100 dark:border-slate-700 pb-2 flex items-center gap-2">
                    <span class="bg-blue-100 dark:bg-transparent p-1 rounded">➕</span> 新增明信片
                </h2>
                
                <!-- Image Input -->
                <div class="mb-4">
                    <label class="block text-xs font-bold text-blue-700 dark:text-slate-400 mb-1.5">圖片來源 (上傳或貼上)</label>
                    <div id="dropZone" class="border-2 border-dashed border-blue-300 dark:border-slate-600 rounded-lg p-3 text-center bg-blue-50/50 hover:bg-blue-100 dark:bg-transparent dark:hover:bg-slate-800 transition-all duration-200 cursor-pointer flex flex-col items-center justify-center min-h-[120px] relative overflow-hidden group" onclick="document.getElementById('fileInput').click()">
                        
                        <div id="placeholderText" class="text-blue-500/70 dark:text-slate-400 transition-transform group-hover:scale-105">
                            <svg class="mx-auto h-8 w-8 mb-1 text-blue-400 dark:text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <p class="text-xs font-medium">點擊、拖曳、或 Ctrl+V</p>
                            <button id="clipboardBtn" class="mt-2 px-3 py-1 bg-white dark:bg-slate-700 hover:bg-blue-50 dark:hover:bg-slate-600 rounded text-xs text-blue-700 dark:text-white transition-all duration-200 z-20 relative shadow-sm border border-blue-200 dark:border-slate-600 font-bold active:scale-95" onclick="event.stopPropagation(); window.pasteFromClipboard();">
                                📋 從剪貼簿讀取
                            </button>
                        </div>
                        
                        <img id="previewImage" src="" alt="預覽" class="hidden absolute inset-0 w-full h-full object-cover z-10" />
                        <button id="removeImageBtn" class="hidden absolute top-2 right-2 z-20 bg-red-500 text-white rounded-full p-1.5 hover:bg-red-600 shadow-md transition-all active:scale-90" onclick="event.stopPropagation(); window.clearPreview();">
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                </div>

                <!-- Info Inputs -->
                <div class="space-y-3 mb-5">
                    <div>
                        <label class="block text-xs font-bold text-blue-700 dark:text-slate-400 mb-1">明信片名稱</label>
                        <input type="text" id="titleInput" placeholder="例如: 無邊際泳池" class="w-full px-3 py-2 bg-blue-50/30 dark:bg-slate-900 border border-blue-200 dark:border-slate-700 rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-600 font-medium">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-blue-700 dark:text-slate-400 mb-1">玩家名稱</label>
                            <input type="text" id="creatorInput" placeholder="例如: Jenma" class="w-full px-3 py-2 bg-blue-50/30 dark:bg-slate-900 border border-blue-200 dark:border-slate-700 rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-600 font-medium">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-blue-700 dark:text-slate-400 mb-1">類型</label>
                            <select id="typeInput" class="w-full px-3 py-2 bg-white dark:bg-slate-900 border border-blue-200 dark:border-slate-700 rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm text-slate-800 dark:text-white font-medium cursor-pointer shadow-sm">
                                <option value="mushroom">🍄 菇點</option>
                                <option value="flower">🌸 花點</option>
                                <option value="hidden_flower">🤫 隱藏花點</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-blue-700 dark:text-slate-400 mb-1">自訂標籤 (選填)</label>
                        <input type="text" id="customTagInput" placeholder="例如：搞笑 (不填則不顯示)" class="w-full px-3 py-2 bg-blue-50/30 dark:bg-slate-900 border border-blue-200 dark:border-slate-700 rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-600 font-medium">
                    </div>

                    <div class="mb-2">
                        <label class="block text-xs font-bold text-blue-700 dark:text-slate-400 mb-1">座標 (可直接貼上 緯度, 經度)</label>
                        <input type="text" id="coordsInput" placeholder="例如: 26.687957, 128.003198" class="w-full px-3 py-2 bg-blue-50/30 dark:bg-slate-900 border border-blue-200 dark:border-slate-700 rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-600 font-mono font-bold">
                    </div>
                    
                    <div class="bg-blue-50 dark:bg-slate-800/50 p-2.5 rounded-md border border-blue-100 dark:border-slate-700/50 flex items-center gap-2">
                        <span class="text-xl drop-shadow-sm">📍</span>
                        <div class="flex-1 overflow-hidden">
                            <span class="text-[10px] text-blue-500 dark:text-slate-400 font-bold block mb-0.5">地點名稱：</span>
                            <span id="previewLocation" class="text-sm text-blue-900 dark:text-slate-300 font-bold truncate block">尚未輸入座標</span>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button id="addBtn" class="w-full bg-blue-500 hover:bg-blue-400 text-white font-extrabold py-3 rounded-lg shadow-blue-500/30 shadow-lg hover:shadow-blue-500/50 transform hover:-translate-y-0.5 active:translate-y-0 active:scale-95 transition-all duration-200 flex justify-center items-center text-sm">
                    <span id="btnText">上傳明信片</span>
                    <svg id="loadingSpinner" class="hidden animate-spin ml-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
                <p id="errorMsg" class="text-red-500 dark:text-red-400 text-xs font-bold mt-3 hidden text-center bg-red-50 dark:bg-transparent p-2 rounded"></p>
                <p id="adminNotice" class="text-yellow-600 dark:text-yellow-400 font-bold text-xs mt-3 hidden text-center bg-yellow-50 dark:bg-transparent p-2 rounded">⚠️ 非管理員上傳，需等候核准後公開。</p>
            </div>

            <!-- Right Column: Gallery / Map -->
            <div class="lg:col-span-3 flex flex-col">
                
                <!-- 控制列 (Filter & View Toggle Bar) -->
                <div class="mb-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="flex flex-wrap gap-2 items-center" id="filterBar">
                        <!-- JS 會處理 active/inactive 的樣式切換 -->
                        <button onclick="window.setFilter('all')" data-type="all" class="filter-btn active-filter">全部顯示</button>
                        <button onclick="window.setFilter('mushroom')" data-type="mushroom" class="filter-btn inactive-filter">🍄 菇點</button>
                        <button onclick="window.setFilter('flower')" data-type="flower" class="filter-btn inactive-filter">🌸 花點</button>
                        <button onclick="window.setFilter('hidden_flower')" data-type="hidden_flower" class="filter-btn inactive-filter">🤫 隱藏花點</button>
                        
                        <!-- 🌍 國家過濾器下拉選單 -->
                        <select id="countryFilter" onchange="window.setCountryFilter(this.value)" class="ml-1 px-3 py-1.5 text-[13px] rounded-lg bg-white dark:bg-slate-800 text-blue-600 dark:text-slate-300 border border-blue-200 dark:border-slate-700 font-bold shadow-sm outline-none cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-700 transition-colors">
                            <option value="all">🌍 所有國家</option>
                        </select>
                    </div>
                    
                    <div class="flex bg-white dark:bg-slate-800 rounded-lg p-1 border border-blue-200 dark:border-slate-700 shadow-sm shrink-0">
                        <button onclick="window.setView('gallery')" id="btnViewGallery" class="px-4 py-1.5 text-xs font-bold rounded-md transition-all duration-200 bg-blue-500 text-white shadow-md transform hover:-translate-y-0.5 active:scale-95">🖼️ 畫廊</button>
                        <button onclick="window.setView('map')" id="btnViewMap" class="px-4 py-1.5 text-xs font-bold rounded-md transition-all duration-200 text-blue-600 dark:text-slate-400 hover:text-blue-800 dark:hover:text-white hover:bg-blue-50 dark:hover:bg-slate-700 active:scale-95">🗺️ 地圖</button>
                    </div>
                </div>

                <!-- 畫廊模式容器 -->
                <div id="galleryContainer" class="flex-grow">
                    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
                        <!-- 明信片卡片會在這裡生成 -->
                    </div>

                    <div id="emptyState" class="hidden text-center py-24 bg-white dark:bg-[#1E293B] rounded-xl border border-blue-100 dark:border-slate-700 shadow-sm mt-0 transition-colors">
                        <span class="text-6xl mb-4 block drop-shadow-md">📭</span>
                        <p class="text-blue-800 dark:text-slate-400 font-bold text-lg">沒有符合條件的明信片</p>
                        <p class="text-blue-500 dark:text-slate-500 text-sm mt-2">趕快新增或調整篩選條件吧！</p>
                    </div>
                </div>

                <!-- 地圖模式容器 -->
                <div id="mapContainerWrapper" class="hidden w-full h-[600px] lg:h-full min-h-[500px] rounded-xl overflow-hidden border border-blue-200 dark:border-slate-700 shadow-xl relative z-10 transition-colors duration-300">
                    <div id="map" class="w-full h-full bg-yellow-50 dark:bg-slate-900 transition-colors duration-300"></div>
                </div>

            </div>

        </div>
    </div>

    <!-- 圖片放大 Modal (Lightbox) -->
    <div id="imageModal" class="hidden fixed inset-0 z-[1200] bg-white/90 dark:bg-black/90 flex justify-center items-center p-4 backdrop-blur-md transition-opacity duration-300" onclick="window.closeImageModal()">
        <img id="modalImage" src="" class="max-w-full max-h-[90vh] object-contain rounded-xl shadow-2xl border border-blue-200 dark:border-slate-700 transform transition-transform duration-300 scale-95" onclick="event.stopPropagation()">
        <button class="absolute top-6 right-6 text-slate-500 dark:text-slate-300 hover:text-blue-600 dark:hover:text-white bg-white dark:bg-slate-800/50 hover:bg-blue-50 dark:hover:bg-slate-700 rounded-full p-3 transition-all duration-200 shadow-lg active:scale-90" onclick="window.closeImageModal()">
            <svg class="w-6 h-6 font-bold" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>

    <!-- 🚀 通用防呆確認 Modal -->
    <div id="confirmModal" class="hidden fixed inset-0 z-[1150] bg-slate-900/60 flex justify-center items-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-[#1E293B] border border-blue-100 dark:border-slate-700 p-6 rounded-2xl shadow-2xl max-w-sm w-full relative overflow-hidden transform scale-100 transition-all">
            <!-- 裝飾用背景光暈 -->
            <div id="cmGlow" class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/10 dark:bg-blue-500/20 rounded-full blur-3xl pointer-events-none transition-colors"></div>
            
            <h3 id="cmTitle" class="text-xl font-extrabold text-blue-900 dark:text-white mb-2 flex items-center gap-2 relative z-10">
                <!-- 標題會動態載入 -->
            </h3>
            <p id="cmDesc" class="text-slate-600 dark:text-slate-300 text-sm font-medium mb-6 relative z-10">
                <!-- 說明會動態載入 -->
            </p>
            <div class="flex justify-end gap-3 relative z-10">
                <button onclick="window.closeConfirmModal()" class="px-5 py-2 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-white rounded-lg text-sm transition-all duration-200 font-bold active:scale-95">取消</button>
                <button id="cmConfirmBtn" class="px-5 py-2 text-white rounded-lg text-sm transition-all duration-200 font-bold shadow-lg active:scale-95 hover:-translate-y-0.5">確認</button>
            </div>
        </div>
    </div>

    <!-- ✏️ 編輯明信片 Modal -->
    <div id="editModal" class="hidden fixed inset-0 z-[1160] bg-slate-900/60 flex justify-center items-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-[#1E293B] border border-blue-100 dark:border-slate-700 p-6 rounded-2xl shadow-2xl max-w-sm w-full relative overflow-hidden max-h-[95vh] overflow-y-auto">
            <h3 class="text-xl font-extrabold text-blue-900 dark:text-white mb-4 flex items-center gap-2 relative z-10">
                <span class="bg-blue-100 dark:bg-transparent p-1 rounded">✏️</span> 修改資訊
            </h3>
            <div class="space-y-3 mb-6 relative z-10">
                <div>
                    <label class="block text-xs font-bold text-blue-700 dark:text-slate-400 mb-1">明信片名稱</label>
                    <input type="text" id="editTitleInput" class="w-full px-3 py-2 bg-blue-50/30 dark:bg-slate-900 border border-blue-200 dark:border-slate-700 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm text-slate-800 dark:text-white font-medium transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-blue-700 dark:text-slate-400 mb-1">類型</label>

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_dim = 800; 

                    if (width > height) {
                        if (width > max_dim) { height *= max_dim / width; width = max_dim; }
                    } else {
                        if (height > max_dim) { width *= max_dim / height; height = max_dim; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    callback(dataUrl);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

            let imageFound = false;
            if (clipboardData.files && clipboardData.files.length > 0) {
                for (let i = 0; i < clipboardData.files.length; i++) {
                    const file = clipboardData.files[i];
                    if (file.type.startsWith('image/')) {
                        compressImage(file, updateImagePreview);
                        imageFound = true; break;
                    }
                }
            }
            if (!imageFound && clipboardData.items) {
                for (let i = 0; i < clipboardData.items.length; i++) {
                    const item = clipboardData.items[i];
                    if (item.type.indexOf('image') !== -1) {
                        const blob = item.getAsFile();
                        if (blob) {
                            compressImage(blob, updateImagePreview);
                            imageFound = true; break;
                        }
                    }
                }
            }
            if (!imageFound) {
                const htmlData = clipboardData.getData('text/html');
                if (htmlData) {
                    const imgMatch = htmlData.match(/<img[^>]+src=["'](data:image\/[^;]+;base64,[^"']+)["']/i);

        async function fetchLocationName(lat, lng) {
            try {

                const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&accept-language=zh-TW`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('API 請求失敗');
                const data = await response.json();
                if (data && data.address) {
                    const addr = data.address;
                    // 套用繁體中文正規化
                    const country = normalizeCountryName(addr.country || '未知國家');
                    const level1 = addr.state || addr.province || addr.county || '';
                    const level2 = addr.city || addr.town || addr.city_district || addr.district || '';
                    const level3 = addr.village || addr.suburb || addr.neighbourhood || addr.road || '';
                    let parts = [country, level1, level2, level3].filter(Boolean);
                    parts = [...new Set(parts)];
                    return { full: parts.join('・') || "未知地點", country: country };
                }
                return { full: "未知地點", country: "未知國家" };
            } catch (error) { return { full: "解析失敗", country: "未知國家" }; }
        }

                    if (hasLiked) {
                        await updateDoc(docRef, { 
                            likedBy: arrayRemove(currentUserId),
                            likes: Math.max(0, (card.likes || 1) - 1)
                        });
                    } else {
                        await updateDoc(docRef, {

                else if (currentUserId && card.creatorUid === currentUserId) isAuthVisible = true;
                
                if (!isAuthVisible) return false;
                if (currentFilter !== 'all' && card.type !== currentFilter) return false;
                
                // 國家過濾器判斷 (套用舊資料打撈與正規化)
                const cardCountry = getCardCountry(card);
                if (currentCountryFilter !== 'all' && cardCountry !== currentCountryFilter) return false;
                
                return true;

                            </span>
                            <button class="text-blue-400 dark:text-slate-500 group-hover/copy:text-blue-600 dark:group-hover/copy:text-white transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                            </button>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 mb-4 relative z-20">
                            <span class="px-2 py-0.5 rounded-full text-[11px] bg-blue-100 dark:bg-slate-800 font-bold border border-blue-200 dark:border-slate-700 flex-shrink-0 shadow-sm" style="color: ${tagInfo.color}">${tagInfo.text}</span>
                            ${countryTagHtml}
                            ${customTagHtml}
                        </div>
                        
                        <div class="mt-auto pt-3 border-t border-blue-100 dark:border-[#2A344A] relative z-20 transition-colors">
                            <div class="flex items-center gap-1.5 text-xs text-slate-500 dark:text-slate-400 font-medium">
                                <div class="w-2.5 h-2.5 rounded-full flex-shrink-0 shadow-sm" style="background-color: ${tagInfo.color}"></div>
                                <span class="truncate" title="${card.locationString}">${card.locationString}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            }).join('');

            renderPaginationControls(totalPages);
        }

        function renderPaginationControls(totalPages) {
            let paginationDiv = document.getElementById('paginationControls');
            if (!paginationDiv) {
                paginationDiv = document.createElement('div');
                paginationDiv.id = 'paginationControls';
                paginationDiv.className = 'mt-10 mb-4 flex justify-center items-center gap-2 flex-wrap';
                document.getElementById('galleryContainer').appendChild(paginationDiv);
            }

            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let html = `
                <button onclick="window.changePage(-1)" class="px-3 py-1.5 rounded-lg border border-blue-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-blue-600 dark:text-slate-300 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-50 dark:hover:bg-slate-700 transition font-bold shadow-sm active:scale-95" ${currentPage === 1 ? 'disabled' : ''}>
                    上一頁
                </button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    const activeClass = i === currentPage 
                        ? 'bg-blue-500 text-white border-blue-500 dark:bg-blue-600 dark:border-blue-600 shadow-md transform -translate-y-0.5' 
                        : 'bg-white dark:bg-slate-800 text-blue-600 dark:text-slate-300 border-blue-200 dark:border-slate-700 hover:bg-blue-50 dark:hover:bg-slate-700 shadow-sm active:scale-95';
                    html += `<button onclick="window.goToPage(${i})" class="w-8 h-8 rounded-lg border flex items-center justify-center font-bold transition-all duration-200 ${activeClass}">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span class="text-blue-400 dark:text-slate-500 px-1 font-bold">...</span>`;
                }
            }

            html += `
                <button onclick="window.changePage(1)" class="px-3 py-1.5 rounded-lg border border-blue-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-blue-600 dark:text-slate-300 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-50 dark:hover:bg-slate-700 transition font-bold shadow-sm active:scale-95" ${currentPage === totalPages ? 'disabled' : ''}>
                    下一頁
                </button>
            `;

            paginationDiv.innerHTML = html;
        }

        window.changePage = function(delta) {
            currentPage += delta;
            updateDisplay();
            document.getElementById('filterBar').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        window.goToPage = function(page) {
            currentPage = page;
            updateDisplay();
            document.getElementById('filterBar').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        function initLeafletMap() {
            leafletMap = L.map('map', { worldCopyJump: true }).setView([23.6978, 120.9605], 7);
            
            lightTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OSM &copy; CARTO', subdomains: 'abcd', maxZoom: 19
            });
            darkTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OSM &copy; CARTO', subdomains: 'abcd', maxZoom: 19
            });

            if (document.documentElement.classList.contains('dark')) {
                darkTileLayer.addTo(leafletMap);
            } else {
                lightTileLayer.addTo(leafletMap);
            }

            mapMarkersLayer = L.layerGroup().addTo(leafletMap);
        }

        function renderMapView(displayCards) {
            if (!leafletMap || !mapMarkersLayer) return;
            mapMarkersLayer.clearLayers();
            const bounds = [];

            displayCards.forEach(card => {
                if (!card.lat || !card.lng) return;

                const tagInfo = getTagInfo(card.type);
                const isPending = card.status === 'pending';
                const borderColor = isPending ? '#eab308' : tagInfo.color;
                
                // 👉 修改：改用 getCardCountry 確保地圖模式的舊資料也會顯示國家
                const normalizedCountry = getCardCountry(card);

                const iconHtml = `
                    <div class="w-14 h-14 rounded-full border-[3px] overflow-hidden shadow-lg transition-transform hover:scale-110 active:scale-95 cursor-pointer" style="border-color: ${borderColor}">
                        <img src="${card.image}" class="w-full h-full object-cover">
                    </div>
                `;
                
                const customIcon = L.divIcon({
                    html: iconHtml,
                    className: 'custom-leaflet-icon',
                    iconSize: [56, 56],
                    iconAnchor: [28, 28],
                    popupAnchor: [0, -28]
                });

                const popupHtml = `
                    <div class="w-48 font-sans">
                        <div class="relative">
                            <img src="${card.image}" class="w-full h-24 object-cover rounded-lg border border-blue-200 dark:border-slate-600 mb-2 cursor-pointer hover:opacity-90 active:scale-95 transition-all shadow-sm" onclick="window.openImageModal('${card.image}')">
                            ${isPending ? '<span class="absolute top-1 right-1 bg-yellow-400 dark:bg-yellow-500 text-blue-900 dark:text-slate-900 text-[10px] font-extrabold px-1.5 py-0.5 rounded shadow">審核中</span>' : ''}
                        </div>
                        <h4 class="font-extrabold text-sm text-blue-900 dark:text-white mb-1 truncate" style="font-family: 'M PLUS Rounded 1c', sans-serif;">${card.title}</h4>
                        <p class="text-[11px] text-slate-500 dark:text-slate-400 mb-2 truncate font-medium">By ${card.creator}</p>
                        
                        <div class="bg-blue-50 dark:bg-[#121726] border border-blue-100 dark:border-[#2A344A] rounded-lg p-2 flex justify-between items-center mb-2 group/copy cursor-pointer hover:bg-blue-100 dark:hover:bg-slate-800 transition-colors" onclick="window.copyCoords(${card.lat}, ${card.lng})" title="點擊複製座標">
                            <span class="text-blue-800 dark:text-slate-300 font-mono text-[10px] tracking-wide truncate font-bold">
                                ${card.lat.toFixed(6)}, ${card.lng.toFixed(6)}
                            </span>
                            <button class="text-blue-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-white transition-colors flex-shrink-0 ml-1">
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                            </button>
                        </div>
                        
                        <div class="flex items-center justify-between border-t border-blue-100 dark:border-slate-700 pt-2 mt-1 gap-1">
                            <div class="flex items-center flex-wrap gap-1">
                                <span class="text-[11px] px-1.5 py-0.5 rounded font-bold shadow-sm bg-blue-50 dark:bg-slate-800 flex-shrink-0" style="color: ${tagInfo.color}">${tagInfo.text}</span>
                                ${normalizedCountry !== '未知國家' ? `<span class="text-[11px] px-1.5 py-0.5 rounded font-bold shadow-sm bg-indigo-50 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 flex-shrink-0">🌍 ${normalizedCountry}</span>` : ''}
                                ${card.customTag ? `<span class="text-[11px] px-1.5 py-0.5 rounded font-bold shadow-sm bg-blue-50 dark:bg-slate-800 text-blue-600 dark:text-slate-300 flex-shrink-0">#${card.customTag}</span>` : ''}
                            </div>
                            <button onclick="window.toggleLike('${card.id}')" class="text-xs ${card.likedBy && card.likedBy.includes(currentUserId) ? 'text-red-500' : 'text-slate-400 dark:text-slate-500'} hover:text-red-500 font-bold flex-shrink-0 transition-colors flex items-center gap-1 active:scale-90">
                                ${card.likedBy && card.likedBy.includes(currentUserId) ? '❤️' : '🤍'} ${card.likes || 0}
                            </button>
                        </div>
                    </div>
                `;

                const marker = L.marker([card.lat, card.lng], { icon: customIcon });
                marker.bindPopup(popupHtml);
                mapMarkersLayer.addLayer(marker);

                bounds.push([card.lat, card.lng]);
            });

            if (bounds.length > 0 && currentDisplayMode === 'map') {
                leafletMap.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
            }
        }

    </script>
</body>
</html>
